<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Draw | Gesture Doodler</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <!-- Webcam Feed (Background) -->
        <video id="input_video" class="input_video" autoplay playsinline></video>
        
        <!-- Canvas for drawing -->
        <canvas id="output_canvas" class="output_canvas"></canvas>
        <canvas id="drawing_canvas" class="drawing_canvas"></canvas>

        <!-- UI Overlay -->
        <div class="ui-panel glass">
            <h1>Air Draw ✨</h1>
            <p class="subtitle">Pinch your index and thumb to draw!</p>
            
            <div class="controls">
                <div class="control-group">
                    <label>Colors</label>
                    <div class="color-picker">
                        <button class="color-btn active" data-color="#ff3366" style="background-color: #ff3366;"></button>
                        <button class="color-btn" data-color="#00e676" style="background-color: #00e676;"></button>
                        <button class="color-btn" data-color="#00ddff" style="background-color: #00ddff;"></button>
                        <button class="color-btn" data-color="#ffea00" style="background-color: #ffea00;"></button>
                        <button class="color-btn" data-color="#ffffff" style="background-color: #ffffff;"></button>
                    </div>
                </div>

                <div class="control-group">
                    <label>Brush Size</label>
                    <input type="range" id="brush_size" min="2" max="25" value="5">
                </div>

                <button id="clear_btn" class="action-btn">Clear Canvas</button>
            </div>
            
            <div id="status" class="status loading">Initializing Camera...</div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #ffdae0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Taaki button screen se bahar na jaye */
        }

        h1 { color: #ff4d6d; text-shadow: 2px 2px #fff; font-size: 2.2rem; text-align: center; }

        .gif-container img { width: 180px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .buttons { margin-top: 50px; display: flex; gap: 30px; }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #ffffff; color: #ff4d6d; position: absolute; z-index: 999; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="gif-container">
    </div><img src="mehu.gif">

    <h1>Do you love me?? ❤️</h1>

    <div class="buttons">
        <button id="yesBtn" onclick="sayYes()">YES</button>
        <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">NO</button>
    </div>

<script>
    const bgMusic = document.getElementById("bgMusic");
    let musicStarted = false;

    // Music Permission Fix
    function startMusic() {
        if (!musicStarted) {
            bgMusic.play().then(() => {
                musicStarted = true;
            }).catch(e => console.log("Click to play"));
        }
    }

    function sayYes() {
        startMusic();
        bgMusic.muted = false;
        bgMusic.play();

        // Beast Mode Layout: Billa Bada & Center, Baby Side mein
        document.body.innerHTML = `
            <div style="text-align:center; padding: 20px; font-family: sans-serif; background-color: #ffcad1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <h1 style="color:#ff4d6d; font-size: 2.5rem; margin-bottom: 20px;">hehe pakad liya love you mwahhh ❤️🥰</h1>
                
                <div style="position: relative; width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: center;">
                    <img src="idk.gif" style="width: 85%; border-radius: 20px; z-index: 2; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                    
                    <img src="ai.gif" style="width: 35%; border-radius: 15px; position: absolute; bottom: -30px; right: 0px; z-index: 3; border: 4px solid white;">
                </div>

                <p style="color:#ff4d6d; font-size:1.2rem; margin-top:50px;">Ab view once me bejho fas fas</p>
            </div>
        `;
    }

    function moveButton() {
        startMusic(); // No button pe jaate hi music ready ho jayega
        const noBtn = document.getElementById("noBtn");
        const padding = 20;
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;

        const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
        const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

        noBtn.style.position = "absolute";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }
</script>
</body>
</html>
